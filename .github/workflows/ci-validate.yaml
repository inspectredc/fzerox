name: ci-validate
on:
  workflow_call:
    secrets:
      FZEROX_PASSPHRASE: { required: true }
      FZEROX_DEPENDENCIES: { required: true }
      FZEROX_TOKEN: { required: true }
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [us, jp]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha || github.ref }}
    - name: Fetch Secrets
      uses: actions/checkout@v4
      with:
        repository: ${{ secrets.FZEROX_DEPENDENCIES }}
        token: ${{ secrets.FZEROX_TOKEN }}
        path: fzerox-secret
    - name: Decrypt Secrets
      working-directory: fzerox-secret
      run: |
        ./decrypt_secret.sh
        mv baserom.${{ matrix.version }}.rev0.z64 ..
      env:
          SECRET_PASSPHRASE: ${{ secrets.FZEROX_PASSPHRASE }}
          SECRET_NAME: baserom.${{ matrix.version }}.rev0.z64
    - name: Install package requirements
      run: sudo apt-get install -y git make git build-essential binutils-mips-linux-gnu python3 python3-pip

    - name: Install Python dependencies
      run: python3 -m pip install -r ./tools/requirements-python.txt

    - name: Update submodules
      run: git submodule update --init --recursive

    - name: build toolchain
      run: make -s -C tools

    - name: Compile
      run: make init VERSION=${{ matrix.version }}

    - name: Generate objdiff report
      run: python3 -m mapfile_parser objdiff_report report.json --version ${{ matrix.version }}

    - name: Upload progress report artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.version }}_report
        path: report.json

    - name: Upload progress to Discord
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' &&  matrix.version == 'us'}}
      run: python3 tools/upload_progress.py --discord_url ${{ secrets.DISCORD_URL }}