name: ci-internal
on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize ]
jobs:
  build:
    if: github.event_name == 'push' || github.repository == github.event.pull_request.head.repo.full_name
    uses: ./.github/workflows/ci-validate.yaml
    secrets: inherit
    if: github.event_name == 'push' || github.repository == github.event.pull_request.head.repo.full_name
    uses: ./.github/workflows/ci-ek-validate.yaml
    secrets: inherit
