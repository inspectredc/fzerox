name: F-Zero X
repo: https://github.com/inspectredc/fzerox
platform: n64
build_system: make
versions:
  - name: us
    fullname: us
    sha1: 5f658e88ffa9de23cba6986a8fd3d3a90d7b4340
    paths:
      target: "baserom.us.rev0.z64"

      build_dir: "build/us/rev0"
      map: "build/us/rev0/fzerox.us.rev0.map"
      compiled_target: "build/us/rev0/fzerox.us.rev0.z64"
      elf: "build/us/rev0/fzerox.us.rev0.elf"

      expected_dir: "expected/"

      asm: "asm/us/rev0"
      nonmatchings: "asm/us/rev0/nonmatchings"

  - name: jp
    fullname: jp
    sha1: a418b0151521b76691fa03f8658c8b567c69498b
    paths:
      target: "baserom.jp.rev0.z64"

      build_dir: "build/jp/rev0"
      map: "build/jp/rev0/fzerox.jp.rev0.map"
      compiled_target: "build/jp/rev0/fzerox.jp.rev0.z64"
      elf: "build/jp/rev0/fzerox.jp.rev0.elf"

      expected_dir: "expected/"

      asm: "asm/jp/rev0"
      nonmatchings: "asm/jp/rev0/nonmatchings"

tools:
  mapfile_parser:
    progress_report:
      check_asm_paths: True
      prefixes_to_trim:
        - build/us/rev0/lib/
        - build/us/rev0/src/
        - build/us/rev0/asm/us/rev0/data/
        - build/us/rev0/asm/us/rev0
        - build/us/rev0/asm/jp/rev0/data
        - build/us/rev0/asm/jp/rev0
        - build/us/rev0/
        - build/jp/rev0/lib/
        - build/jp/rev0/src/
        - build/jp/rev0/asm/us/rev0/data/
        - build/jp/rev0/asm/us/rev0
        - build/jp/rev0/asm/jp/rev0/data
        - build/jp/rev0/asm/jp/rev0
        - build/jp/rev0/
      categories:
        # Categories by segment
        - id: main
          name: main
          paths:
            - game
            - sys
            - audio
            - leo/leo_bootdisk
            - leo/leo_bootstrap
            - libultra
